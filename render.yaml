services:
  - type: web
    name: sesh
    runtime: node
    plan: free
    # --include=dev is required even though NODE_ENV=production is set below —
    # otherwise npm skips devDependencies (vite, typescript) that the build needs.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
